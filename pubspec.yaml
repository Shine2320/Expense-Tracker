name: expense_tracker
description: "A modern expense tracking app with Material 3 UI"
publish_to: 'none'
version: 1.0.0+1

environment:
  # Floor raised from 3.2.3: that stale bound forced pub to resolve win32 5.2.0,
  # which calls UnmodifiableUint8ListView — removed in Dart 3.4. It broke the
  # Windows build and every test that imported a screen.
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  table_calendar: ^3.0.9
  fl_chart: ^0.66.2
  uuid: ^4.3.3
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  file_picker: ^11.0.2
  path_provider: ^2.1.1
  excel: ^2.1.0
  # Direct, though excel already pulls it in: the import guard reads a workbook's
  # declared entry sizes itself, and depending on it implicitly would let an
  # excel upgrade drop it out from under us.
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#6750A4"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
